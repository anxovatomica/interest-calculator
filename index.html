<style>
:root{--brand:#10b981;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8}
* {box-sizing:border-box;margin:0;padding:0}
body {font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:20px;min-height:100vh}
.container {max-width:700px;margin:0 auto}
header {text-align:center;padding:40px 0}
h1 {font-size:2.5rem;margin-bottom:12px;background:linear-gradient(90deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle {color:var(--muted);font-size:1.1rem;max-width:500px;margin:0 auto}
.card {background:var(--card);border-radius:16px;padding:32px;margin-bottom:24px;border:1px solid #334155}
label {display:block;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;font-weight:600}
input {width:100%;padding:12px 16px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:var(--text);font-size:1rem;margin-bottom:20px;transition:border-color .15s}
input:focus {outline:none;border-color:var(--brand)}
.two-col {display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn {display:inline-block;padding:14px 32px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:1.1rem;font-weight:600;cursor:pointer;transition:transform .15s;width:100%;text-align:center}
.btn:hover {transform:translateY(-2px)}
.result {margin-top:32px;padding:24px;background:#0f172a;border-radius:12px;border-left:4px solid var(--brand);display:none}
.result.active {display:block}
.result h2 {font-size:1.5rem;margin-bottom:12px}
.result-value {font-size:2.5rem;font-weight:800;color:var(--brand)}
.chart {margin-top:20px;height:200px;background:#0f172a;border-radius:8px;overflow:hidden;position:relative}
.chart-bar {position:absolute;bottom:0;background:linear-gradient(180deg,#10b981,#06b6d4);border-radius:4px 4px 0 0;transition:height 0.5s ease}
.cta-banner {background:linear-gradient(90deg,#10b981,#06b6d4);padding:20px;border-radius:12px;text-align:center;margin-top:32px}
.cta-banner a {color:#fff;text-decoration:none;font-weight:700;font-size:1.1rem}
footer {text-align:center;color:var(--muted);padding:40px 0;font-size:.875rem}
@media (max-width:768px){.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>Compound Interest Calculator</h1>
<p class="subtitle">See how much your money can grow. Free, instant, no signup.</p>
</header>

<div class="card">
<div class="two-col">
<div>
<label>Initial Investment ($)</label>
<input type="number" id="principal" value="10000" step="100">
</div>
<div>
<label>Monthly Contribution ($)</label>
<input type="number" id="monthly" value="500" step="50">
</div>
</div>
<div class="two-col">
<div>
<label>Annual Interest Rate (%)</label>
<input type="number" id="rate" value="7" step="0.1">
</div>
<div>
<label>Years</label>
<input type="number" id="years" value="10" step="1">
</div>
</div>
<div class="two-col">
<div>
<label>Compounding</label>
<input id="compound" value="Monthly" readonly>
</div>
</div>
<button class="btn" onclick="calculate()">Calculate</button>
</div>

<div class="result" id="resultBox">
<h2>Your Future Value</h2>
<div class="result-value" id="totalValue">$0</div>
<p id="breakdown" style="margin-top:12px;color:var(--muted)"></p>
<div class="chart" id="chart"></div>
</div>

<div class="cta-banner">
<a href="https://anxovatomica.github.io/late-fee-calc/">Running a business? Calculate late fees for clients who pay late!</a>
</div>

<footer>
<p>Compound Interest Calculator | <a href="https://anxovatomica.github.io/pingpaid-growth-tools/">More tools</a></p>
<p style="font-size:.75rem;margin-top:8px">Built with SiteForge. No account required.</p>
</footer>
</div>

<script>
function calculate() {
  const P = parseFloat(document.getElementById('principal').value) || 0;
  const PMT = parseFloat(document.getElementById('monthly').value) || 0;
  const r = (parseFloat(document.getElementById('rate').value) || 0) / 100;
  const t = parseFloat(document.getElementById('years').value) || 0;
  const n = 12; // monthly compounding
  
  const totalMonths = t * 12;
  let total = P;
  const yearlyData = [];
  
  for (let month = 1; month <= totalMonths; month++) {
    total = total * (1 + r / n) + PMT;
    if (month % 12 === 0) {
      yearlyData.push(Math.round(total));
    }
  }
  
  const totalContributed = P + (PMT * totalMonths);
  const interestEarned = total - totalContributed;
  
  document.getElementById('totalValue').textContent = '$' + total.toLocaleString('en-US', {maximumFractionDigits:0});
  document.getElementById('breakdown').textContent = 
    'Contributed: $' + totalContributed.toLocaleString('en-US', {maximumFractionDigits:0}) + 
    ' | Interest earned: $' + interestEarned.toLocaleString('en-US', {maximumFractionDigits:0});
  document.getElementById('resultBox').classList.add('active');
  
  // Draw chart
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  const max = Math.max(...yearlyData);
  const barWidth = Math.max(20, (chart.clientWidth - 40) / yearlyData.length);
  yearlyData.forEach((val, i) => {
    const bar = document.createElement('div');
    bar.className = 'chart-bar';
    bar.style.height = (val / max * 100) + '%';
    bar.style.width = (barWidth - 4) + 'px';
    bar.style.left = (20 + i * barWidth) + 'px';
    bar.title = 'Year ' + (i + 1) + ': $' + val.toLocaleString();
    chart.appendChild(bar);
  });
}
</script>
</body>
